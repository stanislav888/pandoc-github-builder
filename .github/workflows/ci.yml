# .github/workflows/ci.yml
name: Build Resume

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cv.md'
      - 'pandoc-templates/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'CV.md'
      - 'pandoc-templates/**'
  workflow_dispatch:

env:
  OUTPUT_FOLDER: ./release
  FILE_BASENAME: "_Dmitry_C++_SDE"

jobs:
  build:
    name: Build Resume
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install wkhtmltopdf (for PDF generation)
        run: |
          wget -q https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-2/wkhtmltox_0.12.6.1-2.jammy_amd64.deb
          sudo dpkg -i wkhtmltox_0.12.6.1-2.jammy_amd64.deb || sudo apt-get install -f -y
          wkhtmltopdf --version

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_FOLDER }}

      - name: Generate resume files
        env:
          TITLE: "Dmitry a C++ SDE"
          FILE_NAME: "${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}"
          INPUT_FORMAT: "markdown"
          INPUT_FILE: "./CV.md"
          HTML_TEMPLATE_FILE: "./pandoc-templates/sidebar-green-template.html"
        run: |
          #!/bin/bash
          /usr/bin/pandoc ${INPUT_FILE} -t html --pdf-engine=wkhtmltopdf --template="${HTML_TEMPLATE_FILE}" -o ${FILE_NAME}.pdf -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} -s --toc --template="${HTML_TEMPLATE_FILE}" --metadata title="${TITLE}" -o ${FILE_NAME}_live.html -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} -t odt --template=./pandoc-templates/default.opendocument -o ${FILE_NAME}.odt -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} --template=./pandoc-templates/default.ms -o ${FILE_NAME}.docx -f ${INPUT_FORMAT}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test generated files
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Verify generated files exist
        run: |
          test -f ${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.docx
          test -f ${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}_live.html
          test -f ${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.odt
          echo "✅ All files exist!"

      - name: Check PDF is not empty
        run: |
          if [ -s "${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.pdf" ]; then
            echo "✅ PDF file is non-empty"
          else
            echo "❌ PDF file is empty or missing"
            exit 1
          fi