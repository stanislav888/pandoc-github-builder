# .github/workflows/ci.yml
name: Build Resume

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'resume.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'resume.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  FILE_BASENAME: "Dmitry_C++_Software_Developer_resume"
  OUTPUT_FOLDER: ./release
  INPUT_FILE: "./resume.md"
  INPUT_FORMAT: "markdown"
  HTML_TEMPLATE_FILE: "./pandoc-templates/sidebar-green-template.html"
  ODT_TEMPLATE_FILE: "./pandoc-templates/default.opendocument"
  DOCX_TEMPLATE_FILE: "./pandoc-templates/default.ms"

jobs:
  setup-file-names:
    runs-on: ubuntu-latest
    outputs:
      FILE_PDF: ${{ steps.set-names.outputs.FILE_PDF }}
      FILE_ODT: ${{ steps.set-names.outputs.FILE_ODT }}
      FILE_DOCX: ${{ steps.set-names.outputs.FILE_DOCX }}
      FILE_HTML_LIVE: ${{ steps.set-names.outputs.FILE_HTML_LIVE }}
    steps:
      - name: Generate file names
        id: set-names
        run: |
          echo "FILE_PDF=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.pdf" >> $GITHUB_OUTPUT
          echo "FILE_ODT=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.odt" >> $GITHUB_OUTPUT
          echo "FILE_DOCX=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.docx" >> $GITHUB_OUTPUT
          echo "FILE_HTML_LIVE=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}_live.html" >> $GITHUB_OUTPUT

  build:
    name: Build Resume
    runs-on: ubuntu-latest
    needs: setup-file-names
    env:
      FILE_PDF: ${{ needs.setup-file-names.outputs.FILE_PDF }}
      FILE_ODT: ${{ needs.setup-file-names.outputs.FILE_ODT }}
      FILE_DOCX: ${{ needs.setup-file-names.outputs.FILE_DOCX }}
      FILE_HTML_LIVE: ${{ needs.setup-file-names.outputs.FILE_HTML_LIVE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install wkhtmltopdf (for PDF generation)
        run: |
          sudo apt-get install -y xfonts-75dpi xfonts-base xfonts-encodings xfonts-utils 
          wget -q https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-2/wkhtmltox_0.12.6.1-2.jammy_amd64.deb
          sudo dpkg -i wkhtmltox_0.12.6.1-2.jammy_amd64.deb || sudo apt-get install -f -y
          wkhtmltopdf --version

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_FOLDER }}

      - name: Generate PDF
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -t html \
            --pdf-engine=wkhtmltopdf \
            --template="${HTML_TEMPLATE_FILE}" \
            --metadata title="${FILE_BASENAME}" \
            -o ${FILE_PDF} \
            -f ${INPUT_FORMAT}

      - name: Generate HTML (live)
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -s \
            --toc \
            --template="${HTML_TEMPLATE_FILE}" \
            --metadata title="${FILE_BASENAME}" \
            -o ${FILE_HTML_LIVE} \
            -f ${INPUT_FORMAT}

      - name: Generate ODT
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -t odt \
            --template="${ODT_TEMPLATE_FILE}" \
            -o ${FILE_ODT} \
            -f ${INPUT_FORMAT}

      - name: Generate DOCX
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            --template="${DOCX_TEMPLATE_FILE}" \
            -o ${FILE_DOCX} \
            -f ${INPUT_FORMAT}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test generated files
    runs-on: ubuntu-latest
    needs: [setup-file-names, build]
    if: always()

    strategy:
      fail-fast: false
      matrix:
        format:
          - name: PDF
            var: FILE_PDF
            check_size: true
          - name: DOCX
            var: FILE_DOCX
            check_size: true
          - name: ODT
            var: FILE_ODT
            check_size: true
          - name: HTML (live)
            var: FILE_HTML_LIVE
            check_size: true

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Check ${{ matrix.format.name }} exists
        env:
          FILE_PATH: ${{ needs.setup-file-names.outputs[matrix.format.var] }}
        run: |
          if [ -f "${FILE_PATH}" ]; then
            echo "✅ ${{ matrix.format.name }} exists"
          else
            echo "❌ ${{ matrix.format.name }} not found"
            exit 1
          fi

      - name: Check ${{ matrix.format.name }} is not empty
        if: ${{ matrix.format.check_size == true }}
        env:
          FILE_PATH: ${{ needs.setup-file-names.outputs.FILE_PDF }}
        run: |
          if [ -s "${FILE_PATH}" ]; then
            echo "✅ ${{ matrix.format.name }} is non-empty"
          else
            echo "❌ ${{ matrix.format.name }} is empty"
            exit 1
          fi

