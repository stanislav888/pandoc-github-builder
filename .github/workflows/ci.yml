# .github/workflows/ci.yml
name: Build Resume

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'resume.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
      - 'settings.env.txt'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'resume.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
      - 'settings.env.txt'
  workflow_dispatch:

env:
  OUTPUT_FOLDER: ./release
  INPUT_FORMAT: "markdown"

jobs:
  setup-file-names:
    runs-on: ubuntu-latest
    outputs:
      FILE_PDF: ${{ steps.set-names.outputs.FILE_PDF }}
      FILE_ODT: ${{ steps.set-names.outputs.FILE_ODT }}
      FILE_DOCX: ${{ steps.set-names.outputs.FILE_DOCX }}
      FILE_HTML_LIVE: ${{ steps.set-names.outputs.FILE_HTML_LIVE }}
      HTML_TEMPLATE_FILE: ${{ steps.get-vars.outputs.HTML_TEMPLATE_FILE }}
      ODT_TEMPLATE_FILE: ${{ steps.get-vars.outputs.ODT_TEMPLATE_FILE }}
      DOCX_TEMPLATE_FILE: ${{ steps.get-vars.outputs.DOCX_TEMPLATE_FILE }}
      INPUT_FILE: ${{ steps.get-vars.outputs.INPUT_FILE }}
      INPUT_FORMAT: ${{ steps.get-vars.outputs.INPUT_FORMAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create symlink from settings.env.txt to .env
        run: ln -sf settings.env.txt .env

      - name: Load environment from settings.env.txt
        uses: xom9ikk/dotenv@v2
        with:
          path: ./

      - name: Extract template variables
        id: get-vars
        run: |
          echo "HTML_TEMPLATE_FILE=${{ env.HTML_TEMPLATE_FILE }}" >> $GITHUB_OUTPUT
          echo "ODT_TEMPLATE_FILE=${{ env.ODT_TEMPLATE_FILE }}" >> $GITHUB_OUTPUT
          echo "DOCX_TEMPLATE_FILE=${{ env.DOCX_TEMPLATE_FILE }}" >> $GITHUB_OUTPUT
          echo "INPUT_FILE=${{ env.INPUT_FILE }}" >> $GITHUB_OUTPUT
          echo "INPUT_FORMAT=${{ env.INPUT_FORMAT }}" >> $GITHUB_OUTPUT

      - name: Generate file names
        id: set-names
        run: |
          echo "FILE_PDF=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.pdf" >> $GITHUB_OUTPUT
          echo "FILE_ODT=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.odt" >> $GITHUB_OUTPUT
          echo "FILE_DOCX=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}.docx" >> $GITHUB_OUTPUT
          echo "FILE_HTML_LIVE=${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}_live.html" >> $GITHUB_OUTPUT

      - name: Validate environment variables from settings.env.txt 
        run: |
          # List of required variables
          required_vars=(
            "FILE_BASENAME"
            "INPUT_FILE"
            "HTML_TEMPLATE_FILE"
            "ODT_TEMPLATE_FILE"
            "DOCX_TEMPLATE_FILE"
          )
          
          missing_vars=()
          
          for var in "${required_vars[@]}"; do
            value="${!var}"
            if [ -z "$value" ]; then
              missing_vars+=("$var")
            fi
          done
          
          if [ ${#missing_vars[@]} -ne 0 ]; then
            echo "❌ ERROR: The following required variables are empty or missing:"
            printf '  - %s\n' "${missing_vars[@]}"
            echo ""
            echo "Please check your settings.env.txt file and ensure all variables are set."
            exit 1
          fi
          
          echo "✅ All required variables are present:"

  build:
    name: Build Resume
    runs-on: ubuntu-latest
    needs: setup-file-names
    env:
      FILE_PDF: ${{ needs.setup-file-names.outputs.FILE_PDF }}
      FILE_ODT: ${{ needs.setup-file-names.outputs.FILE_ODT }}
      FILE_DOCX: ${{ needs.setup-file-names.outputs.FILE_DOCX }}
      FILE_HTML_LIVE: ${{ needs.setup-file-names.outputs.FILE_HTML_LIVE }}
      HTML_TEMPLATE_FILE: ${{ needs.setup-file-names.outputs.HTML_TEMPLATE_FILE }}
      ODT_TEMPLATE_FILE: ${{ needs.setup-file-names.outputs.ODT_TEMPLATE_FILE }}
      DOCX_TEMPLATE_FILE: ${{ needs.setup-file-names.outputs.DOCX_TEMPLATE_FILE }}
      INPUT_FILE: ${{ needs.setup-file-names.outputs.INPUT_FILE }}
      INPUT_FORMAT: ${{ needs.setup-file-names.outputs.INPUT_FORMAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: pandoc xfonts-75dpi xfonts-base xfonts-encodings xfonts-utils
          version: 1.0   # меняйте вручную, если нужно принудительно сбросить кеш

      - name: Cache wkhtmltopdf installer
        id: cache-wkhtml
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/wkhtmltox.deb
          key: wkhtmltopdf-${{ runner.os }}-0.12.6.1-2

      - name: Download wkhtmltopdf (if not cached)
        if: steps.cache-wkhtml.outputs.cache-hit != 'true'
        run: |
          wget -q -O ${{ runner.temp }}/wkhtmltox.deb \
            https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-2/wkhtmltox_0.12.6.1-2.jammy_amd64.deb

      - name: Install wkhtmltopdf
        run: |
          sudo dpkg -i ${{ runner.temp }}/wkhtmltox.deb || sudo apt-get install -f -y
          wkhtmltopdf --version

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_FOLDER }}

      - name: Generate PDF 
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -t html \
            --pdf-engine=wkhtmltopdf \
            --template="${HTML_TEMPLATE_FILE}" \
            --metadata title="${FILE_BASENAME}" \
            -o ${FILE_PDF} \
            -f ${INPUT_FORMAT}

      - name: Generate HTML (live)
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -s \
            --toc \
            --template="${HTML_TEMPLATE_FILE}" \
            --metadata title="${FILE_BASENAME}" \
            -o ${FILE_HTML_LIVE} \
            -f ${INPUT_FORMAT}

      - name: Generate ODT
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            -t odt \
            --template="${ODT_TEMPLATE_FILE}" \
            -o ${FILE_ODT} \
            -f ${INPUT_FORMAT}

      - name: Generate DOCX
        run: |
          /usr/bin/pandoc ${INPUT_FILE} \
            --template="${DOCX_TEMPLATE_FILE}" \
            -o ${FILE_DOCX} \
            -f ${INPUT_FORMAT}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test generated files
    runs-on: ubuntu-latest
    needs: [setup-file-names, build]
    if: always()

    strategy:
      fail-fast: false
      matrix:
        format:
          - name: PDF
            var: FILE_PDF
            check_size: true
          - name: DOCX
            var: FILE_DOCX
            check_size: true
          - name: ODT
            var: FILE_ODT
            check_size: true
          - name: HTML (live)
            var: FILE_HTML_LIVE
            check_size: true

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Check ${{ matrix.format.name }} exists
        env:
          FILE_PATH: ${{ needs.setup-file-names.outputs[matrix.format.var] }}
        run: |
          if [ -f "${FILE_PATH}" ]; then
            echo "✅ ${{ matrix.format.name }} exists"
          else
            echo "❌ ${{ matrix.format.name }} not found"
            exit 1
          fi

      - name: Check ${{ matrix.format.name }} is not empty
        if: ${{ matrix.format.check_size == true }}
        env:
          FILE_PATH: ${{ needs.setup-file-names.outputs.FILE_PDF }}
        run: |
          if [ -s "${FILE_PATH}" ]; then
            echo "✅ ${{ matrix.format.name }} is non-empty"
          else
            echo "❌ ${{ matrix.format.name }} is empty"
            exit 1
          fi

  # The job is to update resume in GitHub Releases. 
  # It works only with manual workflow launch from 'main' branch only. 
  # Therefore you can experiment with your resume in different branches.
  upload-release:
    name: Upload to GitHub Releases
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: Resume_archive
          path: ./release

      - name: Delete existing release (if any)
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: resume-latest
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new release with latest version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-latest
          name: Resume (Latest)
          body: |
            Latest automatically generated resume
            
            **Build date:** ${{ github.event.repository.updated_at }}
          files: |
            ./release/*.pdf
            ./release/*.docx
            ./release/*.odt
            ./release/*.html
          fail_on_unmatched_files: true
