# .github/workflows/ci.yml
name: Build Resume

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'cv.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'cv.md'
      - 'pandoc-templates/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  OUTPUT_FOLDER: ./release
  FILE_BASENAME: "_Dmitry_C++_SDE"
  
  # Базовый путь ко всем файлам
  FILE_PATH: "${{ env.OUTPUT_FOLDER }}/${{ env.FILE_BASENAME }}"
  
  # Имена всех выходных файлов
  FILE_PDF: "${{ env.FILE_PATH }}.pdf"
  FILE_ODT: "${{ env.FILE_PATH }}.odt"
  FILE_DOCX: "${{ env.FILE_PATH }}.docx"
  FILE_HTML_LIVE: "${{ env.FILE_PATH }}_live.html"

jobs:
  build:
    name: Build Resume
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install wkhtmltopdf (for PDF generation)
        run: |
          wget -q https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-2/wkhtmltox_0.12.6.1-2.jammy_amd64.deb
          sudo dpkg -i wkhtmltox_0.12.6.1-2.jammy_amd64.deb || sudo apt-get install -f -y
          wkhtmltopdf --version

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_FOLDER }}

      - name: Generate resume files
        env:
          TITLE: "Dmitry a C++ SDE"
          INPUT_FORMAT: "markdown"
          INPUT_FILE: "./cv.md"
          HTML_TEMPLATE_FILE: "./pandoc-templates/sidebar-green-template.html"
          FILE_PDF: ${{ env.FILE_PDF }}
          FILE_ODT: ${{ env.FILE_ODT }}
          FILE_DOCX: ${{ env.FILE_DOCX }}
          FILE_HTML_LIVE: ${{ env.FILE_HTML_LIVE }}
        run: |
          #!/bin/bash
          /usr/bin/pandoc ${INPUT_FILE} -t html --pdf-engine=wkhtmltopdf --template="${HTML_TEMPLATE_FILE}" -o ${FILE_PDF} -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} -s --toc --template="${HTML_TEMPLATE_FILE}" --metadata title="${TITLE}" -o ${FILE_HTML_LIVE} -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} -t odt --template=./pandoc-templates/default.opendocument -o ${FILE_ODT} -f ${INPUT_FORMAT}
          /usr/bin/pandoc ${INPUT_FILE} --template=./pandoc-templates/default.ms -o ${FILE_DOCX} -f ${INPUT_FORMAT}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test generated files
    runs-on: ubuntu-latest
    needs: build
    if: always()

    strategy:
      fail-fast: false
      matrix:
        format:
          - name: PDF
            path: ${{ env.FILE_PDF }}
            check_size: true
          - name: DOCX
            path: ${{ env.FILE_DOCX }}
            check_size: false
          - name: ODT
            path: ${{ env.FILE_ODT }}
            check_size: false
          - name: HTML (live)
            path: ${{ env.FILE_HTML_LIVE }}
            check_size: false

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Resume
          path: ${{ env.OUTPUT_FOLDER }}

      - name: Check ${{ matrix.format.name }} exists
        run: |
          if [ -f "${{ matrix.format.path }}" ]; then
            echo "✅ ${{ matrix.format.name }} exists"
          else
            echo "❌ ${{ matrix.format.name }} not found"
            exit 1
          fi

      - name: Check ${{ matrix.format.name }} is not empty
        if: ${{ matrix.format.check_size == true }}
        run: |
          if [ -s "${{ matrix.format.path }}" ]; then
            echo "✅ ${{ matrix.format.name }} is non-empty"
          else
            echo "❌ ${{ matrix.format.name }} is empty"
            exit 1
          fi